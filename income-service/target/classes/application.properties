### Eureka Configuration
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.config.import=optional:configserver:http://localhost:8888

resilience4j.circuitbreaker.instances.incomeService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.incomeService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.incomeService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.incomeService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.incomeService.failureRateThreshold=50


